name: Backend CI

on:
  push:
    paths:
      - .github/workflows/backend-ci.yml
      - .github/workflows/backend-security.yml
      - Dockerfile
      - Makefile
      - healthcheck.sh
      - go/**
  pull_request:
    paths:
      - .github/workflows/backend-ci.yml
      - .github/workflows/backend-security.yml
      - Dockerfile
      - Makefile
      - healthcheck.sh
      - go/**
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: 1.26.1
  GOLANGCI_LINT_VERSION: v2.4.0

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go/go.sum

      - name: Verify Go module files
        run: |
          make deps
          git diff --exit-code -- go/go.mod go/go.sum

      - name: Check formatting
        run: |
          make fmt
          git diff --exit-code -- go

      - name: Verify generated Swagger docs
        run: |
          make swagger
          git diff --exit-code -- go/internal/app/docs

      - name: Run tests
        run: make test

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: go
          args: ./...

      - name: Build backend binary
        run: |
          mkdir -p dist/backend
          cd go
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../dist/backend/steamid-service-linux-amd64 ./cmd/steamid-service

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image archive
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: false
          tags: steamidtools:${{ github.sha }}
          outputs: type=docker,dest=${{ runner.temp }}/steamidtools-image.tar

      - name: Compress Docker image archive
        run: gzip -9 "${{ runner.temp }}/steamidtools-image.tar"

      - name: Upload backend artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: backend-artifacts-${{ github.sha }}
          if-no-files-found: error
          retention-days: 14
          path: |
            dist/backend/steamid-service-linux-amd64
            ${{ runner.temp }}/steamidtools-image.tar.gz
